<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Weather Type System</title>

  <link rel="stylesheet" href="https://use.typekit.net/kxv1wea.css">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>

  <div class="ui">

    <div class="data">
      <div>DATE<span id="date">--</span></div>
      <div>LOCATION<span id="location">LONDON</span></div>

      <div class="spacer"></div>

      <div>PRECIP<span id="precip">--</span></div>
      <div>WIND SPD<span id="wind">--</span></div>
      <div>WIND DIR<span id="dir">--</span></div>
      <div>TEMP<span id="temp">--</span></div>
    </div>

    <div class="command">
      <span>&gt; TYPE LOCATION</span>
      <input id="cityInput" type="text" autocomplete="off"/>
    </div>

    <div class="divider"></div>

    <div class="footer">
      <div>UPDATE...5 MIN INTERVALS</div>
      <div>DATA...OPEN-METEO</div>
    </div>

  </div>

  <script src="sketch.js"></script>

  <script>
    const input = document.getElementById("cityInput");

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const value = input.value.trim();

        if (value !== "") {
          if (window.fetchCity) {
            window.fetchCity(value);
          }
          input.value = "";
        }
      }
    });

    // auto focus 
    window.onload = () => input.focus();
  </script>

</body>
</html>
