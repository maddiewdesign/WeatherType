<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain Halftone</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
  }

  canvas {
    display: block;
  }

  .controls {
    position: fixed;
    bottom: 30px;
    left: 30px;

    background-color: #ffffff;
    padding: 16px 20px;

    border: 1px solid #000; /* add this so you can clearly see it */

    z-index: 10; /* ensure it sits above canvas */

    display: flex;
    align-items: center;
    gap: 12px;

    font-family: sans-serif;
  }
</style>

  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>

  <div class="controls">
    <input type="range" id="rainfall" min="0" max="100" value="90">
    <span id="rainValue">90%</span>
  </div>

  <script src="sketch.js"></script>
</body>

  <script src="sketch.js"></script>

</body>
</html>
